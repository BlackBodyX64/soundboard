name: Build & Release

on:
  push:
    tags:
      - "v*"          # Trigger on version tags: v1.0.0, v1.2.3, etc.

  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Required for creating releases

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish application (Single File)
        run: dotnet publish TikTokSoundboard/TikTokSoundboard.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish_output

      - name: Verify build output
        run: |
          if (!(Test-Path "publish_output\TikTokSoundboard.exe")) {
            Write-Error "Build failed: TikTokSoundboard.exe not found"
            exit 1
          }
          $size = (Get-Item "publish_output\TikTokSoundboard.exe").Length / 1MB
          Write-Host "Build successful! Size: $([math]::Round($size, 2)) MB"

      - name: Create release package
        run: |
          New-Item -ItemType Directory -Path "release_zip" -Force
          Copy-Item "publish_output\*" "release_zip\" -Recurse
          if (Test-Path "soundboard_config.json") { Copy-Item "soundboard_config.json" "release_zip\" -ErrorAction SilentlyContinue }
          if (Test-Path "sounds") { Copy-Item "sounds" "release_zip\sounds" -Recurse -ErrorAction SilentlyContinue }
          if (Test-Path "README.md") { Copy-Item "README.md" "release_zip\" -ErrorAction SilentlyContinue }
          Compress-Archive -Path "release_zip\*" -DestinationPath "TikTok_Soundboard_${{ github.ref_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TikTok_Soundboard
          path: publish_output\TikTokSoundboard.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "TikTok Soundboard ${{ github.ref_name }}"
          body: |
            ## 🎵 TikTok Soundboard ${{ github.ref_name }} (WPF Version)

            ### ดาวน์โหลด
            แตกไฟล์ `.zip` แล้วเปิด `TikTokSoundboard.exe` ได้เลย

            ### วิธีใช้
            1. เปิดโปรแกรม TikTokSoundboard.exe
            2. ลากไฟล์เสียงวางบนปุ่มที่ต้องการ หรือคลิกขวาเพื่อตั้งค่า
            3. กดปุ่มหรือ Hotkey เพื่อเล่นเสียง

            ### System Requirements
            - Windows 10/11 (64-bit)
          draft: false
          prerelease: false
          files: TikTok_Soundboard_${{ github.ref_name }}.zip
          generate_release_notes: true
