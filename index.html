<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 TikTok Soundboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Custom Title Bar -->
  <div id="titlebar">
    <div class="titlebar-left">
      <span class="titlebar-icon">🎵</span>
      <span class="titlebar-title">TikTok Soundboard</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize" title="Minimize">
        <svg width="12" height="2"><rect width="12" height="2" fill="currentColor"/></svg>
      </button>
      <button class="titlebar-btn" id="btn-maximize" title="Maximize">
        <svg width="12" height="12"><rect width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="titlebar-btn titlebar-close" id="btn-close" title="Close">
        <svg width="12" height="12">
          <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Header -->
  <div id="header">
    <div class="header-left">
      <button id="btn-stop-all" class="btn-stop">
        <span>⏹</span> Stop All
      </button>
    </div>
    <div class="header-right">
      <label class="switch-container" id="hotkey-toggle">
        <span class="switch-label">Global Hotkeys</span>
        <div class="switch">
          <input type="checkbox" id="hotkeys-switch" checked>
          <span class="switch-slider"></span>
        </div>
      </label>
    </div>
  </div>

  <!-- Volume Bar -->
  <div id="volume-bar">
    <div class="volume-control">
      <span class="volume-icon">🔊</span>
      <input type="range" id="master-volume" min="0" max="100" value="80" class="volume-slider">
      <span id="volume-label" class="volume-value">80%</span>
    </div>
    <span class="hint-text">🎧 ลากไฟล์เสียงวางบนปุ่ม  |  คลิกขวาตั้งค่า</span>
  </div>

  <!-- Main Content -->
  <div id="content">
    <!-- Left: Keyboard -->
    <div id="keyboard-section">
      <!-- F-Keys -->
      <div class="section-label">Function Keys</div>
      <div class="key-row" id="fkey-row"></div>

      <div class="section-divider"></div>

      <!-- Main Keyboard -->
      <div class="section-label">Main Keyboard</div>
      <div id="main-keyboard"></div>
    </div>

    <!-- Right: Numpad -->
    <div id="numpad-section">
      <div class="section-label">Numpad</div>
      <div id="numpad-keys"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="modal-overlay hidden">
    <div id="settings-modal" class="modal">
      <div class="modal-header">
        <span id="modal-title">⚙ ตั้งค่าปุ่ม</span>
      </div>
      <div class="modal-body">
        <label class="field-label">ไฟล์เสียง:</label>
        <div class="file-input-row">
          <input type="text" id="modal-file-path" class="text-input" readonly placeholder="ยังไม่ได้เลือกไฟล์...">
          <button id="modal-browse-btn" class="btn-browse">📂</button>
        </div>

        <label class="field-label">ชื่อแสดง:</label>
        <input type="text" id="modal-display-name" class="text-input" placeholder="ชื่อที่แสดงบนปุ่ม">

        <label class="field-label">Volume:</label>
        <div class="volume-row">
          <input type="range" id="modal-volume" min="0" max="100" value="100" class="volume-slider modal-volume-slider">
          <span id="modal-volume-label" class="volume-value">100%</span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-save-btn" class="btn-save">💾 บันทึก</button>
        <button id="modal-clear-btn" class="btn-clear">🗑 ล้าง</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
